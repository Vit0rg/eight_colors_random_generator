name: Generate Eight Colors

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-colors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Colors
        run: bash generate_colors.sh

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add date_hour_colors *_colors README.md
          git commit -m "Update colors at $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
